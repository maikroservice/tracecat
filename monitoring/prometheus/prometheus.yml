global:
  scrape_interval: 15s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: tracecat-api
    static_configs:
      - targets: ["api.internal:8000"]
    metrics_path: /metrics

  - job_name: tracecat-worker
    static_configs:
      - targets: ["worker.internal:9091"]
    metrics_path: /metrics

  - job_name: tracecat-executor
    static_configs:
      - targets: ["executor.internal:9092"]
    metrics_path: /metrics

  - job_name: tracecat-agent-executor
    static_configs:
      - targets: ["agent-executor.internal:9093"]
    metrics_path: /metrics
